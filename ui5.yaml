specVersion: "4.0"
metadata:
    name: b1.slick
type: library
framework:
    name: SAPUI5
    version: "1.120.27"
    libraries:
        - name: sap.ui.core
        - name: sap.ui.mdc
        - name: sap.m
server:
    customMiddleware:
        - name: ui5-tooling-transpile-middleware
          afterMiddleware: compression
builder:
    customTasks:
        - name: ui5-tooling-transpile-task
          afterTask: replaceVersion
